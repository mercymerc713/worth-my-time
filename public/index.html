<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#07070f" />
    <meta name="description" content="Worth My Time? — Game intelligence for busy people. Discover games that fit your schedule with Time, Adventure, and Worth It scores across 500,000+ titles." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WorthMyTime" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Icons -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

    <!-- Open Graph / Social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://worthmytime.info/" />
    <meta property="og:title" content="Worth My Time?" />
    <meta property="og:description" content="Game intelligence for busy people. Find games that fit your schedule — 500,000+ titles scored for time, adventure, and value." />
    <meta property="og:image" content="https://worthmytime.info/icon-512.png" />
    <meta property="og:site_name" content="Worth My Time?" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Worth My Time?" />
    <meta name="twitter:description" content="Game intelligence for busy people. 500,000+ games scored for time, adventure, and value." />
    <meta name="twitter:image" content="https://worthmytime.info/icon-512.png" />

    <!-- Fonts — preconnect first, then load async to unblock render -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Bitter:wght@700;900&family=Space+Mono:wght@400;700&family=Lora:ital@1&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Bitter:wght@700;900&family=Space+Mono:wght@400;700&family=Lora:ital@1&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Bitter:wght@700;900&family=Space+Mono:wght@400;700&family=Lora:ital@1&display=swap" rel="stylesheet" /></noscript>

    <title>Worth My Time?</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
  </body>
</html>
